sentence=Driver library for LILYGO T-Keyboard-S3-Pro
paragraph=Unified driver for the LILYGO T-Keyboard-S3-Pro (ESP32-S3 + STM32G030 co-processor): up to five GC9107 128x128 IPS panels on a shared SPI bus with chip-select multiplexed over I2C (full LovyanGFX drawing API), five keys and 14 WS2812C RGB LEDs read/driven through the STM32 over I2C, and an optional rotary encoder. Supports magnetically chained boards on one I2C bus. Access through the global TKeyboardS3Pro object.
category=Device Control
url=https://github.com/Xinyuan-LilyGO/T-Keyboard-S3-Pro-Library.git
architectures=esp32
depends=LovyanGFX,ButtonSense
includes=TKeyboardS3Pro.h
